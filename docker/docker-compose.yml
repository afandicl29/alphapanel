version: "3.9"

services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-alphapanel_root}
      MYSQL_DATABASE: alphapanel
      MYSQL_USER: alphapanel
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-alphapanel_secret}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - alphapanel

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - alphapanel

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../backend/.env
    depends_on:
      - mariadb
      - redis
    ports:
      - "4000:4000"
    networks:
      - alphapanel

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_WS_URL: http://localhost:4000
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - alphapanel

volumes:
  mariadb_data:
  redis_data:

networks:
  alphapanel:
    driver: bridge
